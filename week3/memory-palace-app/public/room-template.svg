<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" className="w-full h-auto rounded-xl border border-slate-700">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
  </defs>
  <!-- back wall -->
  <rect width="400" height="280" fill="url(#wall)"/>
  <!-- floor (perspective) -->
  <path d="M 0 180 L 400 180 L 380 280 L 20 280 Z" fill="url(#floor)" stroke="#64748b" strokeWidth="1"/>
  <!-- door (left) -->
  <rect x="20" y="120" width="70" height="100" rx="4" fill="#4a5568" stroke="#94a3b8" strokeWidth="2"/>
  <rect x="28" y="128" width="54" height="84" fill="#1e293b"/>
  <text x="55" y="175" textAnchor="middle" fill="#94a3b8" fontSize="14" fontWeight="600">DOOR</text>
  <!-- window (top center) -->
  <rect x="150" y="25" width="100" height="65" rx="4" fill="#0f172a" stroke="#64748b" strokeWidth="2"/>
  <line x1="200" y1="25" x2="200" y2="90" stroke="#475569" strokeWidth="1"/>
  <line x1="150" y1="57" x2="250" y2="57" stroke="#475569" strokeWidth="1"/>
  <text x="200" y="75" textAnchor="middle" fill="#94a3b8" fontSize="12" fontWeight="600">WINDOW</text>
  <!-- desk (right) -->
  <rect x="280" y="100" width="95" height="75" rx="4" fill="#57534e" stroke="#a8a29e" strokeWidth="2"/>
  <rect x="288" y="108" width="79" height="59" fill="#44403c"/>
  <text x="327" y="145" textAnchor="middle" fill="#d6d3d1" fontSize="12" fontWeight="600">DESK</text>
  <!-- bed (bottom left) -->
  <rect x="25" y="195" width="110" height="70" rx="6" fill="#6b7280" stroke="#9ca3af" strokeWidth="2"/>
  <rect x="35" y="205" width="90" height="50" fill="#4b5563"/>
  <text x="80" y="238" textAnchor="middle" fill="#d1d5db" fontSize="12" fontWeight="600">BED</text>
  <!-- shelf (bottom right) -->
  <rect x="260" y="195" width="120" height="45" rx="4" fill="#78716c" stroke="#a8a29e" strokeWidth="2"/>
  <line x1="290" y1="195" x2="290" y2="240" stroke="#57534e" strokeWidth="1"/>
  <line x1="320" y1="195" x2="320" y2="240" stroke="#57534e" strokeWidth="1"/>
  <line x1="350" y1="195" x2="350" y2="240" stroke="#57534e" strokeWidth="1"/>
  <text x="320" y="222" textAnchor="middle" fill="#d6d3d1" fontSize="12" fontWeight="600">SHELF</text>
</svg>
